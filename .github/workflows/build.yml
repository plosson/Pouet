name: Build & Notarize PKG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe

      - name: Import Application certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/app.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/app.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/app.p12

      - name: Import Installer certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_INSTALLER_P12 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/installer.p12
          security import /tmp/installer.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/installer.p12

      - name: Build and package
        run: make pkg

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set +e
          xcrun notarytool submit build/Pouet-*.pkg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee /tmp/notarize.log
          RESULT=$?
          SUBMISSION_ID=$(grep -o '[0-9a-f\-]\{36\}' /tmp/notarize.log | head -1)
          # Check for Invalid status or non-zero exit
          if [ $RESULT -ne 0 ] || grep -q "status: Invalid" /tmp/notarize.log; then
            echo "::error::Notarization failed. Fetching log..."
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                /tmp/notarize-log.json 2>/dev/null
              cat /tmp/notarize-log.json 2>/dev/null || echo "Could not fetch log"
            fi
            exit 1
          fi
          xcrun stapler staple build/Pouet-*.pkg

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Pouet-pkg
          path: build/Pouet-*.pkg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Pouet-*.pkg

      - name: Update appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          PKG_FILE=$(ls build/Pouet-*.pkg)
          PKG_NAME=$(basename "$PKG_FILE")
          DOWNLOAD_URL="https://github.com/plosson/Pouet/releases/download/v${VERSION}/${PKG_NAME}"

          # Download Sparkle tools
          curl -sL https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz | tar xJ -C /tmp

          # Sign the pkg and get signature + length
          echo -n "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          SIGN_OUTPUT=$(/tmp/bin/sign_update "$PKG_FILE" -f /tmp/sparkle_key)
          rm -f /tmp/sparkle_key
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          FILE_LENGTH=$(stat -f%z "$PKG_FILE")
          PUB_DATE=$(date -R)

          # Build the new appcast entry
          {
            echo '<?xml version="1.0" encoding="utf-8"?>'
            echo '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">'
            echo '  <channel>'
            echo '    <title>Pouet</title>'
            echo '    <language>en</language>'
            echo '    <item>'
            echo "      <title>Version ${VERSION}</title>"
            echo "      <sparkle:version>${VERSION}</sparkle:version>"
            echo "      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>"
            echo "      <pubDate>${PUB_DATE}</pubDate>"
            echo '      <enclosure'
            echo "        url=\"${DOWNLOAD_URL}\""
            echo "        length=\"${FILE_LENGTH}\""
            echo '        type="application/octet-stream"'
            echo "        sparkle:edSignature=\"${ED_SIGNATURE}\""
            echo '        sparkle:installationType="package"'
            echo '      />'
            echo '    </item>'
            echo '  </channel>'
            echo '</rss>'
          } > appcast.xml

          # Commit and push the updated appcast
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add appcast.xml
          git commit -m "Update appcast for v${VERSION}"
          git push origin main
